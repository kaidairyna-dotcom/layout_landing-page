<!doctype html>
<html
  class="page"
  lang="en"
>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>My bike</title>
    <link
      rel="stylesheet"
      href="style.scss"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page__body">
    <header class="header">
      <div class="top-bar">
        <a
          href="#"
          class="top-bar__logo"
        >
          <img
            src="images/Logo.png"
            alt="bike logo"
          />
        </a>

        <div class="top-bar__icons">
          <a
            href="tel:+12345555555"
            class="icon icon--phone"
          ></a>
          <a
            href="#menu"
            class="icon icon--menu"
          ></a>
        </div>
      </div>

      <div class="header__bottom">
        <h1 class="header__title">Take the Streets</h1>
      </div>
    </header>

    <aside
      class="page__menu menu"
      id="menu"
    >
      <div class="top-bar menu__top">
        <a
          href="#"
          class="top-bar__logo"
        >
          <img
            src="images/Logo black.png"
            alt="bike logo"
          />
        </a>

        <a
          href="#"
          class="icon icon--close"
        ></a>
      </div>
      <div class="menu__content">
        <nav class="nav menu__nav">
          <ul class="nav__list">
            <li class="nav__item">
              <a
                class="nav__link"
                href="#home"
              >
                Home
              </a>
            </li>
            <li class="nav__item">
              <a
                class="nav__link"
                href="#about-us"
              >
                About Us
              </a>
            </li>
            <li class="nav__item">
              <a
                class="nav__link"
                href="#compare-bikes"
              >
                Compare Bikes
              </a>
            </li>
            <li class="nav__item">
              <a
                class="nav__link"
                href="#details"
              >
                Details
              </a>
            </li>
            <li class="nav__item">
              <a
                class="nav__link"
                href="#contacts"
              >
                Contacts
              </a>
            </li>
          </ul>
        </nav>
        <a
          href="tel:+12345555555"
          class="menu__phone-number"
        >
          +1 234 5555-55-55
        </a>
        <a
          href="tel:+12345555555"
          class="menu__book-test-ride"
        >
          Book a test ride
        </a>
      </div>
    </aside>

    <main class="main">
      <section
        class="home"
        id="home"
      >
        <h2>Home</h2>
      </section>

      <section
        class="about"
        id="about-us"
      >
        <h2>About Us</h2>
      </section>

      <section
        class="compare"
        id="compare-bikes"
      >
        <h2>Compare Bikes</h2>
      </section>

      <section
        class="details"
        id="details"
      >
        <h2>Details</h2>
      </section>

      <section
        class="contacts"
        id="contacts"
      >
        <h2>Contacts</h2>
      </section>
    </main>

    <footer class="footer"></footer>
  </body>
</html>
